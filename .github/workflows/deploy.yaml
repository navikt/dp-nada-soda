name: build, push and deploy
on: 
  push:
    branches:
      - 'main'
    paths-ignore:
      - 'Dockerfile.dummy'
      - '.github/workflows/bump_soda_image.yaml'
  workflow_run:
    workflows:
      - Update Soda Image Tag
    types:
      - completed

jobs:
  deploy-dev-gcp:
    name: Deploy-dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Deploy to dev-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/dev/soda-config.yaml,.nais/dev/soda-checks.yaml,.nais/dev/naisjob.yaml

  deploy-prod-gcp:
    name: Deploy-prod
    runs-on: ubuntu-latest
    needs: [deploy-dev-gcp] 
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Deploy to prod-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/prod/soda-config.yaml,.nais/prod/soda-checks.yaml,.nais/prod/naisjob.yaml
